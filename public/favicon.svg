<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left wing top -->
  <ellipse cx="32" cy="30" rx="28" ry="22" fill="#3B82F6" opacity="0.92" transform="rotate(-20 32 30)"/>
  <!-- Left wing bottom -->
  <ellipse cx="28" cy="62" rx="20" ry="16" fill="#60A5FA" opacity="0.85" transform="rotate(15 28 62)"/>
  <!-- Right wing top -->
  <ellipse cx="68" cy="30" rx="28" ry="22" fill="#3B82F6" opacity="0.92" transform="rotate(20 68 30)"/>
  <!-- Right wing bottom -->
  <ellipse cx="72" cy="62" rx="20" ry="16" fill="#60A5FA" opacity="0.85" transform="rotate(-15 72 62)"/>
  <!-- Wing shimmer left top -->
  <ellipse cx="30" cy="26" rx="10" ry="7" fill="#93C5FD" opacity="0.5" transform="rotate(-20 30 26)"/>
  <!-- Wing shimmer right top -->
  <ellipse cx="70" cy="26" rx="10" ry="7" fill="#93C5FD" opacity="0.5" transform="rotate(20 70 26)"/>
  <!-- Body -->
  <ellipse cx="50" cy="48" rx="4" ry="22" fill="#1E3A5F"/>
  <!-- Head -->
  <circle cx="50" cy="24" r="4" fill="#1E3A5F"/>
  <!-- Antennae left -->
  <line x1="48" y1="22" x2="38" y2="10" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="38" cy="10" r="2" fill="#1E3A5F"/>
  <!-- Antennae right -->
  <line x1="52" y1="22" x2="62" y2="10" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="62" cy="10" r="2" fill="#1E3A5F"/>
</svg>
